<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OWN.CAR — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#0B0B0C;--surface:#131315;--surface2:#1A1A1F;--surface3:#232329;
    --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);
    --text:#F4F4F2;--muted:#A1A1A6;--muted2:#6D6D72;
    --accent:#D4AF37;--accent-2:#E7C65A;--accent-soft:rgba(212,175,55,0.14);
    --green:#43B581;--green-soft:rgba(67,181,129,0.18);--amber:#E0A44A;--amber-soft:rgba(224,164,74,0.16);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;font-family:'Hanken Grotesk',system-ui,sans-serif;}
  h1,h2,h3,.disp{font-family:'Archivo',system-ui,sans-serif;}
  body{background:radial-gradient(700px 340px at 90% -5%,rgba(212,175,55,0.08),rgba(0,0,0,0) 60%),var(--bg);color:var(--text);min-height:100vh;}
  .wrap{max-width:1120px;margin:0 auto;padding:22px 20px 60px;}
  button{cursor:pointer;font-family:inherit;}
  .btn{border:none;border-radius:12px;font-size:14px;font-weight:700;padding:12px 18px;background:var(--accent);color:#0B0B0C;}
  .btn.ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--line2);font-weight:500;}
  input{width:100%;height:50px;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--text);font-size:15px;padding:0 15px;outline:none;}
  input:focus{border-color:var(--accent);}
  label{font-size:12px;color:var(--muted);letter-spacing:.4px;display:block;margin:0 2px 8px;}

  /* login */
  .login{max-width:380px;margin:8vh auto 0;text-align:center;}
  .logo{width:70px;height:70px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;background:radial-gradient(circle at 50% 35%,#2a2420,#101012 80%);font-size:15px;font-weight:800;}
  .logo b{color:var(--accent);}
  .login h1{font-size:24px;}
  .login p{color:var(--muted);font-size:14px;margin:6px 0 22px;}
  .err{color:#ff8a97;font-size:13px;min-height:16px;margin:8px 0 2px;}

  /* header */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .top .brand{display:flex;align-items:center;gap:12px;}
  .top .mono{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;background:radial-gradient(circle at 50% 35%,#241c20,#0e0e10 80%);}
  .top .mono b{color:var(--accent);}
  .top h1{font-size:19px;}
  .top small{display:block;font-size:9px;color:var(--muted2);letter-spacing:2px;}
  .pillinfo{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:5px 11px;}

  .grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;}
  @media(max-width:820px){ .grid{grid-template-columns:1fr;} }
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;}
  .card h2{font-size:15px;margin-bottom:14px;}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-head .m{font-size:15px;font-weight:700;font-family:'Archivo',sans-serif;}
  .navb{width:34px;height:34px;border-radius:9px;background:var(--surface2);border:1px solid var(--line);color:var(--text);font-size:16px;}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;}
  .dow span{text-align:center;font-size:10px;color:var(--muted2);letter-spacing:.5px;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cell{aspect-ratio:1;border-radius:9px;border:1px solid var(--line);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:var(--text);position:relative;}
  .cell.empty{background:transparent;border:none;}
  .cell.has{background:var(--green-soft);border-color:rgba(67,181,129,.5);color:#bff0d6;font-weight:700;cursor:pointer;}
  .cell.sel{outline:2px solid var(--accent);}
  .cell .cnt{position:absolute;top:3px;right:4px;font-size:9px;background:var(--green);color:#06231a;border-radius:8px;padding:0 5px;font-weight:700;}
  .cell.today{border-color:var(--accent);}
  .leg{display:flex;gap:16px;margin-top:14px;font-size:11px;color:var(--muted);}
  .leg i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:5px;}

  /* list */
  .listhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
  .listhead h2{font-size:16px;}
  .bk{border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:12px;background:var(--surface2);}
  .bk .r1{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .bk .who{font-size:15px;font-weight:700;font-family:'Archivo',sans-serif;}
  .bk .car{font-size:13px;color:var(--accent);margin-top:1px;}
  .bk .meta{font-size:12.5px;color:var(--muted);margin-top:9px;line-height:1.7;}
  .bk .meta b{color:var(--text);font-weight:600;}
  .bk .desc{margin-top:9px;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 11px;white-space:pre-wrap;}
  .stbtn{border:none;border-radius:10px;font-size:12px;font-weight:700;padding:9px 13px;white-space:nowrap;flex:0 0 auto;}
  .st-not{background:var(--amber-soft);color:#f0c88a;border:1px solid rgba(224,164,74,.4);}
  .st-conf{background:var(--accent-soft);color:var(--accent-2);border:1px solid rgba(212,175,55,.5);}
  .st-done{background:var(--green-soft);color:#7fe0b4;border:1px solid rgba(67,181,129,.5);}
  .empty-msg{color:var(--muted);text-align:center;padding:30px 0;font-size:14px;}
  .hint{font-size:11px;color:var(--muted2);margin-top:2px;}
  /* view nav (Bookings | Customers) */
  .vnav{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;}
  .vnav button{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:8px 15px;border-radius:9px;}
  .vnav button.on{background:var(--surface3);color:var(--text);}

  /* customers area */
  .searchbox{margin-bottom:12px;}
  .clist{max-height:64vh;overflow:auto;margin:-2px;padding:2px;}
  .crow{display:block;width:100%;text-align:left;padding:11px 13px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--surface2);color:inherit;cursor:pointer;transition:border-color .12s,background .12s;}
  .crow:hover{border-color:var(--line2);}
  .crow.on{border-color:var(--accent);background:var(--accent-soft);}
  .crow .ce{font-size:13.5px;font-weight:600;word-break:break-all;}
  .crow .cu{font-size:11px;color:var(--muted2);margin-top:2px;}
  .cust-empty{color:var(--muted);text-align:center;padding:26px 0;font-size:14px;}

  .detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px;}
  .detail-head .dn{font-size:18px;font-weight:800;font-family:'Archivo',sans-serif;}
  .detail-head .de{font-size:12.5px;color:var(--muted);margin-top:2px;word-break:break-all;}
  .badge{font-size:10px;font-weight:800;letter-spacing:1px;padding:5px 11px;border-radius:20px;text-transform:uppercase;white-space:nowrap;flex:0 0 auto;}
  .badge.act{background:var(--green-soft);color:#7fe0b4;border:1px solid rgba(67,181,129,.5);}
  .badge.ina{background:var(--amber-soft);color:#f0c88a;border:1px solid rgba(224,164,74,.4);}
  .sectlabel{font-size:11px;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;margin:20px 2px 10px;}
  .carrow{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:13px;margin-bottom:10px;background:var(--surface2);}
  .carrow .cimg{width:44px;height:44px;border-radius:10px;flex:0 0 auto;border:1px solid var(--line2);background:repeating-linear-gradient(135deg,#26262c,#26262c 6px,#1c1c21 6px,#1c1c21 12px);}
  .carrow .cinfo{flex:1;min-width:0;}
  .carrow .cn{font-size:14.5px;font-weight:700;font-family:'Archivo',sans-serif;}
  .carrow .cp{font-size:12px;color:var(--muted);margin-top:2px;}
  .carrow .cpct{font-size:12px;color:var(--accent);font-weight:700;margin-top:3px;}
  .rmbtn{border:1px solid rgba(225,73,73,.4);background:rgba(225,73,73,.12);color:#ff8a97;border-radius:10px;font-size:12px;font-weight:700;padding:9px 13px;flex:0 0 auto;}
  .nocars{color:var(--muted);border:1px dashed var(--line2);border-radius:13px;padding:20px 16px;text-align:center;font-size:13.5px;line-height:1.6;background:var(--surface2);}
  .addbox{margin-top:8px;border:1px solid var(--line);border-radius:14px;padding:15px;background:var(--surface2);}
  .addrow{display:flex;gap:10px;}
  .addrow input{flex:1;}
  .addrow .btn{flex:0 0 auto;}
  .preview{font-size:12.5px;margin:10px 2px 0;min-height:18px;line-height:1.5;}
  .preview.ok{color:#7fe0b4;} .preview.no{color:var(--muted);}
  .detail-ph{color:var(--muted);text-align:center;padding:60px 20px;font-size:14px;line-height:1.6;}

  .gload{position:fixed;inset:0;background:rgba(5,5,7,.5);display:none;align-items:center;justify-content:center;z-index:200;}
  .gload.show{display:flex;} .gspin{width:40px;height:40px;border:3px solid rgba(255,255,255,.25);border-top-color:#D4AF37;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="gload" id="gload"><div class="gspin"></div></div>
<div class="wrap" id="app"></div>
<script>
const $=(h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const app=document.getElementById('app');
const gload=document.getElementById('gload');
const STATUSES=['Not confirmed yet','Confirmed','Service done'];
const stClass={'Not confirmed yet':'st-not','Confirmed':'st-conf','Service done':'st-done'};
let BOOKINGS=[], VY, VM, SEL=null, STORAGE='';
let VIEW='bookings', CUSTOMERS=[], CUST_SEL=null, CUST_DETAIL=null;

// Shared top bar with the Bookings | Customers switch.
function navHeader(active, info){
  return `<div class="top">
    <div class="brand"><div class="mono"><span>O<b>.</b>C</span></div><div><h1>OWN.CAR Admin<small>STAFF DASHBOARD</small></h1></div></div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div class="vnav"><button data-v="bookings" class="${active==='bookings'?'on':''}">Bookings</button><button data-v="customers" class="${active==='customers'?'on':''}">Customers</button></div>
      <span class="pillinfo">${esc(info||('storage: '+STORAGE))}</span>
      <button class="btn ghost" id="logout">Sign out</button>
    </div>
  </div>`;
}
function wireHeader(){
  const lo=document.getElementById('logout'); if(lo) lo.onclick=async()=>{ await api('/api/admin/logout',{method:'POST'}); renderLogin(); };
  document.querySelectorAll('.vnav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
}
function go(view){ VIEW=view; if(view==='customers') renderCustomers(); else renderDash(); }

async function api(path,opts){
  gload.classList.add('show');
  try{ const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts}); const d=await r.json().catch(()=>({})); if(!r.ok) throw d; return d; }
  finally{ gload.classList.remove('show'); }
}
const two=(n)=>String(n).padStart(2,'0');
const isoOf=(y,m,d)=>`${y}-${two(m+1)}-${two(d)}`;
const fmtDate=(s)=>{ if(!s) return ''; const d=new Date(s); if(isNaN(d)) return s; return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };
const esc=(s)=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// ---------- LOGIN ----------
function renderLogin(msg){
  app.innerHTML='';
  app.appendChild($(`<div class="login">
    <div class="logo"><span>O<b>.</b>C</span></div>
    <h1>OWN.CAR Admin</h1>
    <p>Staff access only</p>
    <label style="text-align:left">PASSWORD</label>
    <input id="pw" type="password" placeholder="Enter admin password" autocomplete="current-password">
    <div class="err" id="err">${msg||''}</div>
    <button class="btn" style="width:100%;margin-top:6px" id="go">Sign in</button>
  </div>`));
  const go=async()=>{
    const pw=document.getElementById('pw').value;
    try{ await api('/api/admin/login',{method:'POST',body:JSON.stringify({password:pw})}); boot(); }
    catch(e){ document.getElementById('err').textContent=(e&&e.error)||'Wrong password.'; }
  };
  document.getElementById('go').onclick=go;
  document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
}

// ---------- DASHBOARD ----------
async function loadBookings(){
  const d=await api('/api/admin/bookings');
  BOOKINGS=(d.bookings||[]).slice();
}
function countByDate(){
  const m={};
  BOOKINGS.forEach(b=>{ const k=(b.preferred_date||'').slice(0,10); if(k) m[k]=(m[k]||0)+1; });
  return m;
}
function renderDash(){
  app.innerHTML='';
  const now=new Date();
  if(VY===undefined){ VY=now.getFullYear(); VM=now.getMonth(); }
  app.appendChild($(navHeader('bookings', BOOKINGS.length+' bookings · storage: '+STORAGE)));
  const grid=$(`<div class="grid"></div>`);
  grid.appendChild(buildCalendar());
  grid.appendChild(buildList());
  app.appendChild(grid);
  wireHeader();
}

function buildCalendar(){
  const counts=countByDate();
  const first=new Date(VY,VM,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(VY,VM+1,0).getDate();
  const monthName=first.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const todayIso=isoOf(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  const card=$(`<div class="card"></div>`);
  card.appendChild($(`<div class="cal-head"><button class="navb" id="pm">‹</button><div class="m">${monthName}</div><button class="navb" id="nm">›</button></div>`));
  card.appendChild($(`<div class="dow"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>`));
  const cal=$(`<div class="cal"></div>`);
  for(let i=0;i<startDow;i++) cal.appendChild($(`<div class="cell empty"></div>`));
  for(let d=1;d<=daysInMonth;d++){
    const iso=isoOf(VY,VM,d);
    const c=counts[iso]||0;
    const cls=['cell']; if(c>0) cls.push('has'); if(iso===todayIso) cls.push('today'); if(iso===SEL) cls.push('sel');
    const cell=$(`<div class="${cls.join(' ')}">${c>0?`<span class="cnt">${c}</span>`:''}<span>${d}</span></div>`);
    if(c>0) cell.onclick=()=>{ SEL=(SEL===iso?null:iso); renderDash(); };
    cal.appendChild(cell);
  }
  card.appendChild(cal);
  card.appendChild($(`<div class="leg"><span><i style="background:var(--green)"></i>Has appointments</span><span><i style="background:var(--surface2);border:1px solid var(--line)"></i>None</span></div>`));
  card.appendChild($(`<div class="hint">Tap a green date to see that day's appointments.</div>`));
  setTimeout(()=>{ const p=document.getElementById('pm'),n=document.getElementById('nm'); if(p)p.onclick=()=>{ VM--; if(VM<0){VM=11;VY--;} renderDash(); }; if(n)n.onclick=()=>{ VM++; if(VM>11){VM=0;VY++;} renderDash(); }; },0);
  return card;
}

function buildList(){
  const card=$(`<div class="card"></div>`);
  let list=BOOKINGS.slice().sort((a,b)=>(b.preferred_date||'').localeCompare(a.preferred_date||''));
  if(SEL) list=list.filter(b=>(b.preferred_date||'').slice(0,10)===SEL);
  const head=$(`<div class="listhead"><h2>${SEL?('Appointments on '+fmtDate(SEL)+' ('+list.length+')'):('All appointments ('+list.length+')')}</h2>${SEL?'<button class="btn ghost" id="showall">Show all</button>':''}</div>`);
  card.appendChild(head);
  if(!list.length){ card.appendChild($(`<div class="empty-msg">No appointments${SEL?' on this day':' yet'}.</div>`)); }
  list.forEach(b=>{
    const st=b.status||'Not confirmed yet';
    const card2=$(`<div class="bk">
      <div class="r1">
        <div><div class="who">${esc(b.customer_name||b.customer_email||'Customer')}</div><div class="car">${esc(b.car_name||'')} ${b.plate?('· '+esc(b.plate)):''}</div></div>
        <button class="stbtn ${stClass[st]}" data-id="${esc(b.id)}">${esc(st)}</button>
      </div>
      <div class="meta"><b>Date:</b> ${fmtDate(b.preferred_date)} &nbsp; <b>Time:</b> ${esc(b.time_slot||'-')} &nbsp; <b>Service:</b> ${esc(b.service_type||'-')}<br>
        <b>Phone:</b> ${esc(b.phone||'-')} &nbsp; <b>Email:</b> ${esc(b.customer_email||'-')}</div>
      ${b.description?`<div class="desc">${esc(b.description)}</div>`:''}
    </div>`);
    const btn=card2.querySelector('.stbtn');
    btn.onclick=async()=>{
      const cur=btn.textContent.trim();
      const next=STATUSES[(STATUSES.indexOf(cur)+1)%STATUSES.length];
      try{ await api('/api/admin/bookings/'+encodeURIComponent(b.id)+'/status',{method:'POST',body:JSON.stringify({status:next})});
        b.status=next; btn.textContent=next; btn.className='stbtn '+stClass[next];
      }catch(e){ alert((e&&e.error)||'Could not update status.'); }
    };
    card.appendChild(card2);
  });
  setTimeout(()=>{ const s=document.getElementById('showall'); if(s) s.onclick=()=>{ SEL=null; renderDash(); }; },0);
  return card;
}

// ---------- CUSTOMERS ----------
async function renderCustomers(){
  app.innerHTML='';
  app.appendChild($(navHeader('customers','storage: '+STORAGE)));
  const grid=$(`<div class="grid"></div>`);
  grid.appendChild($(`<div class="card"><h2 id="clisttitle">Registered customers</h2><div class="searchbox"><input id="csearch" placeholder="Search email…" autocomplete="off"></div><div class="clist" id="clist"><div class="cust-empty">Loading…</div></div></div>`));
  grid.appendChild($(`<div class="card" id="cdetail"></div>`));
  app.appendChild(grid);
  wireHeader();
  renderDetailPlaceholder();
  try{ const d=await api('/api/admin/customers'); CUSTOMERS=d.customers||[]; }catch(e){ CUSTOMERS=[]; }
  renderCustList('');
  const s=document.getElementById('csearch'); if(s) s.oninput=()=>renderCustList(s.value.trim().toLowerCase());
  if(CUST_SEL && CUSTOMERS.some(c=>c.email===CUST_SEL)) openCustomer(CUST_SEL);
}
function renderCustList(q){
  const box=document.getElementById('clist'); if(!box) return;
  const title=document.getElementById('clisttitle'); if(title) title.textContent='Registered customers ('+CUSTOMERS.length+')';
  box.innerHTML='';
  const list=CUSTOMERS.filter(c=>!q||(c.email||'').toLowerCase().includes(q));
  if(!list.length){ box.appendChild($(`<div class="cust-empty">${CUSTOMERS.length?'No match.':'No customers have set a password yet.'}</div>`)); return; }
  list.forEach(c=>{
    const on=c.email===CUST_SEL;
    const row=$(`<button class="crow ${on?'on':''}"><div class="ce">${esc(c.email)}</div><div class="cu">Password set ${c.updated?fmtDate(c.updated):'—'}</div></button>`);
    row.onclick=()=>{ CUST_SEL=c.email; renderCustList(q); openCustomer(c.email); };
    box.appendChild(row);
  });
}
function renderDetailPlaceholder(){
  const box=document.getElementById('cdetail'); if(box) box.innerHTML='<div class="detail-ph">Select a customer to view and manage their cars.</div>';
}
async function openCustomer(email){
  const box=document.getElementById('cdetail'); if(!box) return;
  box.innerHTML='<div class="detail-ph">Loading…</div>';
  let d; try{ d=await api('/api/admin/customers/'+encodeURIComponent(email)); }
  catch(e){ box.innerHTML='<div class="detail-ph">Could not load this customer.</div>'; return; }
  CUST_DETAIL=d; renderDetail(d);
}
function renderDetail(d){
  const box=document.getElementById('cdetail'); if(!box) return;
  const badge=d.active?'<span class="badge act">Active</span>':'<span class="badge ina">Inactive</span>';
  const cars=d.cars.map(c=>{
    const name=c.car||'Unknown model';
    const bits=[c.year,c.color].filter(Boolean).join(' · ');
    const pct=(typeof c.percent==='number')?`${c.percent}% owned`:'';
    return `<div class="carrow"><div class="cimg"></div><div class="cinfo"><div class="cn">${esc(name)}</div><div class="cp">${esc(c.plate||'')}${bits?(' · '+esc(bits)):''}</div>${pct?`<div class="cpct">${esc(pct)}</div>`:''}</div><button class="rmbtn" data-plate="${esc(c.plate||'')}">Remove</button></div>`;
  }).join('');
  box.innerHTML='';
  box.appendChild($(`<div>
    <div class="detail-head"><div><div class="dn">${esc(d.name||d.email)}</div><div class="de">${esc(d.email)}</div></div>${badge}</div>
    <div class="sectlabel">Cars (${d.cars.length})</div>
    ${d.cars.length?cars:`<div class="nocars">No cars subscribed. This customer's home screen shows the <b>inactive</b> state — "no cars subscribed, pay the amount to collect your security cheque".</div>`}
    <div class="sectlabel">Add a car</div>
    <div class="addbox">
      <label>Number plate</label>
      <div class="addrow"><input id="nplate" placeholder="e.g. E 61146" autocomplete="off"><button class="btn" id="addcar">Add</button></div>
      <div class="preview no" id="preview">Type a plate — the model &amp; ownership % are detected automatically.</div>
    </div>
  </div>`));
  box.querySelectorAll('.rmbtn').forEach(b=>b.onclick=()=>removeCar(d.email,b.dataset.plate));
  const inp=document.getElementById('nplate'), prev=document.getElementById('preview'), add=document.getElementById('addcar');
  let t=null;
  inp.oninput=()=>{ clearTimeout(t); const val=inp.value.trim(); if(!val){ prev.className='preview no'; prev.textContent='Type a plate — the model & ownership % are detected automatically.'; return; } t=setTimeout(()=>lookupPlate(val,prev),350); };
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); add.click(); } });
  add.onclick=()=>addCar(d.email,inp.value.trim());
}
async function lookupPlate(plate,prev){
  try{ const r=await api('/api/admin/lookup?plate='+encodeURIComponent(plate));
    if(r.found&&r.vehicle){ const v=r.vehicle; const bits=[v.year,v.color].filter(Boolean).join(' · '); const pct=(typeof v.percent==='number')?` · ${v.percent}% owned`:''; prev.className='preview ok'; prev.innerHTML='✓ '+esc(v.car)+(bits?(' · '+esc(bits)):'')+esc(pct); }
    else { prev.className='preview no'; prev.textContent='Not found in the fleet — it will be added with the plate only (no model info).'; }
  }catch(e){ prev.className='preview no'; prev.textContent=''; }
}
async function addCar(email,plate){
  if(!plate) return;
  try{ const d=await api('/api/admin/customers/'+encodeURIComponent(email)+'/cars',{method:'POST',body:JSON.stringify({plate})}); CUST_DETAIL=d; renderDetail(d); }
  catch(e){ alert((e&&e.error)||'Could not add the car.'); }
}
async function removeCar(email,plate){
  if(!confirm('Remove this car from '+email+'?')) return;
  try{ const d=await api('/api/admin/customers/'+encodeURIComponent(email)+'/cars/remove',{method:'POST',body:JSON.stringify({plate})}); CUST_DETAIL=d; renderDetail(d); }
  catch(e){ alert((e&&e.error)||'Could not remove the car.'); }
}

// ---------- BOOT ----------
async function boot(){
  try{ const me=await api('/api/admin/me'); STORAGE=me.storage||''; await loadBookings(); renderDash(); }
  catch(e){ renderLogin(); }
}
boot();
</script>
